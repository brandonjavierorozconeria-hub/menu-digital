<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital | Alitas & Burgers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Poppins', sans-serif; }
        .header { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            padding: 60px 20px; text-align: center; border-bottom: 3px solid #ff4b2b;
        }
        .categoria-titulo { 
            color: #ff4b2b; font-weight: 800; text-transform: uppercase; 
            margin-top: 40px; margin-bottom: 20px; letter-spacing: 2px;
            border-left: 5px solid #ff4b2b; padding-left: 15px;
        }
        .card-menu { 
            background: #1a1a1a; border: none; border-radius: 15px; 
            overflow: hidden; margin-bottom: 20px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card-img-top { height: 160px; object-fit: cover; }
        .precio { color: #00d2ff; font-weight: bold; font-size: 1.25rem; }
        .desc-text { color: #aaaaaa; font-size: 0.85rem; height: 40px; overflow: hidden; }
        .combo-banner {
            background: #ff4b2b; color: white; border-radius: 10px;
            padding: 15px; margin: 20px 0; font-weight: bold;
        }
        .btn-wa {
            fixed-bottom: 20px; right: 20px; z-index: 1000;
            background-color: #25d366; color: white; border-radius: 50px;
            padding: 15px 25px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <h1 class="display-4 fw-bold">ALITAS & BURGERS</h1>
    <p class="lead">El sabor que manda 🔥</p>
</div>

<div class="container pb-5">
    
    <div class="combo-banner text-center shadow">
        🍟 ¡HAZLO COMBO! <br>
        <span class="fw-light">+ $25 Francesas | + $30 Gajo</span>
    </div>

    {% for categoria, productos in menu.items() %}
    <h2 class="categoria-titulo">{{ categoria }}</h2>
    <div class="row">
        {% for item in productos %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card card-menu text-white">
                <img src="{{ item.img }}" class="card-img-top" alt="{{ item.nombre }}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="card-title fw-bold">{{ item.nombre }}</h5>
                        <span class="precio">${{ item.precio }}</span>
                    </div>
                    <p class="card-text desc-text">{{ item.desc }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endfor %}

</div>
<a href="https://wa.me/525562541202?text=Hola!%20Me%20gustaria%20hacer%20un%20pedido" 
   class="btn btn-success btn-lg rounded-pill px-5 shadow" 
   target="_blank">
    📱 Hacer Pedido al 55 6254 1202
</a>
</body>
</html>
